name: Deploy to Windows Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

  deploy:
    name: Deploy
    needs: build
    runs-on: [self-hosted, Windows, X64, calldeals]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy on Windows server
        shell: cmd
        run: call scripts\deploy-windows.bat
